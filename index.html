<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcos Bernard | CRM Laboral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .modal-active { overflow: hidden; }
    </style>
</head>
<body class="bg-gray-50 text-slate-800 min-h-screen">

    <nav class="border-b border-gray-200 bg-white/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-700 tracking-tight">
                <i class="fa-solid fa-briefcase mr-2"></i>CRM<span class="text-slate-400 font-light">LABORAL</span>
            </h1>
            <div id="stats" class="text-xs font-semibold uppercase tracking-wider text-slate-500 bg-slate-100 px-3 py-1 rounded-full">Cargando...</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <header class="mb-12 border-l-4 border-blue-600 pl-6">
            <h2 class="text-4xl font-extrabold text-slate-900 tracking-tight">Control de Postulaciones</h2>
            <p class="text-slate-500 mt-2 text-lg italic">"I'm building a future for us" — Road to CEO @ 30</p>
        </header>

        <div class="mb-6 relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i class="fa-solid fa-magnifying-glass text-slate-400"></i>
            </div>
            <input type="text" id="searchInput" 
                class="block w-full pl-11 pr-4 py-3 border border-gray-200 rounded-2xl bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all shadow-sm placeholder:text-slate-400" 
                placeholder="Buscar por empresa, puesto o tecnología (ej: Python, Adecco, Remoto)...">
        </div>

        <div class="mb-8 flex flex-wrap gap-4 items-center bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest mr-2">Leyenda de Prioridad:</span>
            
            <div class="flex items-center gap-2">
                <span class="px-2 py-0.5 rounded text-[10px] font-bold bg-red-100 text-red-700 border border-red-200 uppercase">Máxima</span>
                <span class="text-[11px] text-slate-500">Sueldo alto / Match total con mi Portafolio.</span>
            </div>

            <div class="flex items-center gap-2">
                <span class="px-2 py-0.5 rounded text-[10px] font-bold bg-amber-100 text-amber-700 border border-amber-200 uppercase">Alta</span>
                <span class="text-[11px] text-slate-500">Empresa Top (Entel/Adecco) / Rol de Liderazgo.</span>
            </div>

            <div class="flex items-center gap-2">
                <span class="px-2 py-0.5 rounded text-[10px] font-bold bg-blue-100 text-blue-700 border border-blue-200 uppercase">Media</span>
                <span class="text-[11px] text-slate-500">Buen proyecto / Freelance o Remoto estable.</span>
            </div>
        </div>

        <div id="app" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <div id="helpModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-hidden flex flex-col">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-blue-50">
                <h3 id="modalTitle" class="text-xl font-bold text-blue-900 leading-tight"></h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500 transition-colors text-2xl">&times;</button>
            </div>
            <div id="modalContent" class="p-8 overflow-y-auto space-y-6">
                </div>
            <div class="p-4 bg-gray-50 border-t border-gray-100 text-right">
                <button onclick="closeModal()" class="bg-slate-900 text-white px-6 py-2 rounded-xl font-bold hover:bg-slate-700 transition-all">Entendido</button>
            </div>
        </div>
    </div>

    <script>
        let currentPostulaciones = [];

        async function loadPostulaciones() {
            try {
                const response = await fetch('data/postulaciones.json');
                const data = await response.json();
                currentPostulaciones = Array.isArray(data) ? data : [data];
                renderStats(currentPostulaciones);
                renderCards(currentPostulaciones);
                
                // Listener para el buscador
                document.getElementById('searchInput').addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    const filtered = currentPostulaciones.filter(job => 
                        job.empresa.toLowerCase().includes(term) ||
                        job.puesto.toLowerCase().includes(term) ||
                        job.stack_tecnico.some(t => t.toLowerCase().includes(term)) ||
                        job.cliente_sector.toLowerCase().includes(term)
                    );
                    renderCards(filtered);
                    renderStats(filtered); // Actualiza el contador según lo filtrado
                });
            } catch (error) {
                console.error("Error cargando el JSON:", error);
            }
        }

        function renderStats(data) {
            document.getElementById('stats').innerHTML = `Viendo: ${data.length} | Total: ${currentPostulaciones.length}`;
        }

        function renderCards(data) {
            const container = document.getElementById('app');
            
            if (data.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-12 text-center bg-white rounded-3xl border border-dashed border-slate-300 text-slate-400">
                        <i class="fa-solid fa-folder-open text-4xl mb-3"></i>
                        <p>No se encontraron resultados para tu búsqueda.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = data.map(job => {
                // Lógica de colores de prioridad
                const priorityColor = job.prioridad === 'Máxima' ? 'bg-red-100 text-red-700 border-red-200' : 
                                    job.prioridad === 'Alta' ? 'bg-amber-100 text-amber-700 border-amber-200' : 
                                    'bg-blue-100 text-blue-700 border-blue-200';

                return `
                    <div class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm hover:shadow-xl transition-all duration-300 flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start mb-4">
                                <span class="text-[10px] font-bold text-slate-400 tracking-widest uppercase">ID #${job.id}</span>
                                <span class="px-2 py-1 rounded text-[10px] font-bold ${priorityColor} border uppercase">${job.prioridad}</span>
                            </div>
                            <h3 class="text-xl font-bold text-slate-900 leading-tight">${job.empresa}</h3>
                            <p class="text-blue-600 font-medium text-sm mb-4">${job.puesto}</p>
                            
                            <div class="flex flex-wrap gap-2 mb-6">
                                ${job.stack_tecnico.map(tech => `<span class="bg-slate-50 text-slate-600 px-2 py-1 rounded text-[10px] font-semibold border border-gray-100">${tech}</span>`).join('')}
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3 mt-4">
                            <a href="${job.url_vacante}" target="_blank" class="text-center py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-bold transition-colors text-xs uppercase tracking-wider">Ver Vacante</a>
                            <button onclick="openHelp(${job.id})" class="text-center py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition-all text-xs uppercase tracking-wider shadow-lg shadow-blue-200">
                                <i class="fa-solid fa-lightbulb mr-1"></i> Ayuda
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openHelp(id) {
            const job = currentPostulaciones.find(j => j.id === id);
            if (!job) return;

            document.getElementById('modalTitle').innerHTML = `
                <div class="text-xs text-blue-600 font-mono mb-1">REPORTE TÉCNICO #${job.id}</div>
                <div class="text-xl font-black text-slate-900">${job.empresa}</div>
            `;

            const content = document.getElementById('modalContent');
            
            content.innerHTML = `
                <div class="grid grid-cols-2 gap-4 bg-slate-50 p-4 rounded-xl border border-slate-200 mb-6 text-sm">
                    <div><span class="font-bold text-slate-500 uppercase text-[10px] block">Sector:</span> ${job.cliente_sector}</div>
                    <div><span class="font-bold text-slate-500 uppercase text-[10px] block">Proyecto:</span> ${job.proyecto_detalle}</div>
                </div>

                <div class="space-y-6">
                    <h4 class="font-bold text-blue-800 border-b pb-2 flex items-center">
                        <i class="fa-solid fa-lightbulb mr-2"></i> Estrategia de Entrevista
                    </h4>
                    ${job.estrategia_completa.map((sec, idx) => `
                        <div class="relative pl-6 border-l-2 border-blue-200">
                            <div class="absolute -left-[9px] top-0 w-4 h-4 bg-blue-500 rounded-full border-2 border-white"></div>
                            <p class="font-bold text-slate-800 text-sm mb-1">${idx + 1}. ${sec.titulo}</p>
                            <p class="text-slate-600 text-sm leading-relaxed">${sec.contenido}</p>
                        </div>
                    `).join('')}
                </div>

                <div class="mt-8">
                    <h4 class="font-bold text-slate-800 mb-3 text-sm flex items-center">
                        <i class="fa-solid fa-circle-info mr-2 text-blue-500"></i> Notas Clave
                    </h4>
                    <ul class="space-y-2">
                        ${job.notas_adicionales.map(nota => `
                            <li class="flex items-start text-sm text-slate-600 bg-gray-50 p-3 rounded-lg border border-gray-100">
                                <i class="fa-solid fa-check text-blue-500 mt-1 mr-3 text-xs"></i>
                                <span>${nota}</span>
                            </li>
                        `).join('')}
                    </div>
                </div>
            `;

            document.getElementById('helpModal').classList.remove('hidden');
            document.body.classList.add('modal-active');
        }

        function closeModal() {
            document.getElementById('helpModal').classList.add('hidden');
            document.body.classList.remove('modal-active');
        }

        loadPostulaciones();
    </script>
</body>
</html>
